<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大量科技｜產銷會議記錄產生器</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Microsoft JhengHei', '微軟正黑體', Arial, sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── 登入畫面 ── */
  #loginScreen {
    background: white;
    border-radius: 16px;
    padding: 48px 40px;
    width: 380px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    text-align: center;
  }
  #loginScreen .logo {
    font-size: 13px;
    color: #888;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  #loginScreen h1 {
    font-size: 22px;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 6px;
  }
  #loginScreen .subtitle {
    font-size: 13px;
    color: #999;
    margin-bottom: 36px;
  }
  #loginScreen input {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid #e0e0e0;
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    margin-bottom: 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  #loginScreen input:focus { border-color: #2563eb; }
  #loginScreen button {
    width: 100%;
    padding: 13px;
    background: #1a1a2e;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s;
    margin-top: 4px;
  }
  #loginScreen button:hover { background: #2563eb; }
  #loginError {
    color: #ef4444;
    font-size: 13px;
    margin-top: 12px;
    min-height: 18px;
  }

  /* ── 主畫面 ── */
  #mainScreen {
    display: none;
    width: 100%;
    min-height: 100vh;
    flex-direction: column;
  }

  header {
    background: #1a1a2e;
    color: white;
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header .brand { font-size: 15px; font-weight: 700; letter-spacing: 1px; }
  header .user-info { font-size: 13px; color: #94a3b8; display: flex; align-items: center; gap: 16px; }
  header .logout-btn {
    background: transparent;
    border: 1px solid #334155;
    color: #94a3b8;
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  header .logout-btn:hover { border-color: #64748b; color: white; }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 24px;
    width: 100%;
  }

  .page-title {
    font-size: 24px;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 6px;
  }
  .page-desc {
    font-size: 14px;
    color: #64748b;
    margin-bottom: 32px;
  }

  /* ── 步驟卡片 ── */
  .step-card {
    background: white;
    border-radius: 12px;
    padding: 24px 28px;
    margin-bottom: 20px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    border: 1.5px solid #e8ecf0;
  }
  .step-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
  }
  .step-num {
    width: 30px; height: 30px;
    background: #1a1a2e;
    color: white;
    border-radius: 50%;
    font-size: 13px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .step-title { font-size: 16px; font-weight: 700; color: #1a1a2e; }
  .step-hint { font-size: 12px; color: #94a3b8; margin-left: auto; }

  /* ── 拖曳區 ── */
  .drop-zone {
    border: 2px dashed #cbd5e1;
    border-radius: 10px;
    padding: 28px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: #f8fafc;
    position: relative;
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: #2563eb;
    background: #eff6ff;
  }
  .drop-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .drop-icon { font-size: 28px; margin-bottom: 8px; }
  .drop-label { font-size: 14px; color: #64748b; }
  .drop-label strong { color: #2563eb; }
  .drop-accept { font-size: 11px; color: #94a3b8; margin-top: 4px; }

  .file-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #f0fdf4;
    border: 1px solid #86efac;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    color: #166534;
    margin-top: 10px;
  }
  .file-badge .remove {
    background: none; border: none; cursor: pointer;
    color: #86efac; font-size: 16px; line-height: 1;
    padding: 0 0 0 4px;
  }
  .file-badge .remove:hover { color: #ef4444; }

  /* ── 三欄拖曳 ── */
  .drop-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 14px;
  }
  .drop-col label { display: block; font-size: 12px; font-weight: 700; color: #475569; margin-bottom: 8px; letter-spacing: 0.5px; text-transform: uppercase; }

  /* ── 產出按鈕 ── */
  #generateBtn {
    width: 100%;
    padding: 16px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  #generateBtn:hover:not(:disabled) { background: #1d4ed8; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(37,99,235,0.3); }
  #generateBtn:disabled { background: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; }

  /* ── 進度 ── */
  #progressArea {
    display: none;
    background: white;
    border-radius: 12px;
    padding: 24px 28px;
    margin-bottom: 20px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    border: 1.5px solid #e8ecf0;
  }
  .progress-title { font-size: 14px; font-weight: 700; color: #1a1a2e; margin-bottom: 16px; }
  .progress-steps { display: flex; flex-direction: column; gap: 10px; }
  .progress-step {
    display: flex; align-items: center; gap: 12px;
    font-size: 14px; color: #64748b;
  }
  .progress-step .icon { font-size: 16px; width: 20px; text-align: center; }
  .progress-step.done { color: #16a34a; }
  .progress-step.active { color: #2563eb; font-weight: 600; }
  .progress-step.active .icon { animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 結果 ── */
  #resultArea {
    display: none;
    background: white;
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 20px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    border: 1.5px solid #bbf7d0;
    text-align: center;
  }
  #resultArea .success-icon { font-size: 40px; margin-bottom: 12px; }
  #resultArea h3 { font-size: 18px; font-weight: 700; color: #166534; margin-bottom: 6px; }
  #resultArea p { font-size: 14px; color: #64748b; margin-bottom: 20px; }
  #downloadBtn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 28px;
    background: #16a34a; color: white;
    border: none; border-radius: 8px;
    font-size: 15px; font-weight: 600;
    cursor: pointer; font-family: inherit;
    transition: all 0.2s;
  }
  #downloadBtn:hover { background: #15803d; }

  #errorArea {
    display: none;
    background: #fef2f2;
    border: 1.5px solid #fca5a5;
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 20px;
    font-size: 14px;
    color: #991b1b;
  }
</style>
</head>
<body>

<!-- 登入畫面 -->
<div id="loginScreen">
  <div class="logo">大量科技股份有限公司</div>
  <h1>產銷會議記錄</h1>
  <div class="subtitle">請登入並輸入 Gemini API Key</div>
  <input type="text" id="loginUser" placeholder="帳號" autocomplete="username">
  <input type="password" id="loginPass" placeholder="密碼" autocomplete="current-password">
  <input type="password" id="loginApiKey" placeholder="Gemini API Key" autocomplete="off">
  <button onclick="doLogin()">登入</button>
  <div id="loginError"></div>
</div>

<!-- 主畫面 -->
<div id="mainScreen">
  <header>
    <div class="brand">大量科技｜產銷會議記錄產生器</div>
    <div class="user-info">
      <span id="userLabel"></span>
      <button class="logout-btn" onclick="doLogout()">登出</button>
    </div>
  </header>

  <div class="container">
    <div class="page-title">每週產銷會議記錄</div>
    <div class="page-desc">請依序上傳三個檔案，系統將自動產生本週會議記錄 Word 檔。</div>

    <!-- Step 1 -->
    <div class="step-card">
      <div class="step-header">
        <div class="step-num">1</div>
        <div class="step-title">上傳三份檔案</div>
        <div class="step-hint">拖曳或點擊上傳</div>
      </div>
      <div class="drop-grid">
        <div class="drop-col">
          <label>📹 會議錄影</label>
          <div class="drop-zone" id="dropMp4" ondragover="dragOver(event,'dropMp4')" ondragleave="dragLeave('dropMp4')" ondrop="dropFile(event,'mp4')">
            <input type="file" accept="video/mp4,.mp4" onchange="fileSelected(event,'mp4')">
            <div class="drop-icon">🎬</div>
            <div class="drop-label"><strong>點擊</strong>或拖曳</div>
            <div class="drop-accept">MP4 影片</div>
          </div>
          <div id="badgeMp4"></div>
        </div>
        <div class="drop-col">
          <label>📄 上週會議記錄</label>
          <div class="drop-zone" id="dropDocx" ondragover="dragOver(event,'dropDocx')" ondragleave="dragLeave('dropDocx')" ondrop="dropFile(event,'docx')">
            <input type="file" accept=".docx" onchange="fileSelected(event,'docx')">
            <div class="drop-icon">📝</div>
            <div class="drop-label"><strong>點擊</strong>或拖曳</div>
            <div class="drop-accept">Word 檔 (.docx)</div>
          </div>
          <div id="badgeDocx"></div>
        </div>
        <div class="drop-col">
          <label>📊 本週報告資料</label>
          <div class="drop-zone" id="dropXlsx" ondragover="dragOver(event,'dropXlsx')" ondragleave="dragLeave('dropXlsx')" ondrop="dropFile(event,'xlsx')">
            <input type="file" accept=".xlsx,.xls" onchange="fileSelected(event,'xlsx')">
            <div class="drop-icon">📊</div>
            <div class="drop-label"><strong>點擊</strong>或拖曳</div>
            <div class="drop-accept">Excel 檔 (.xlsx)</div>
          </div>
          <div id="badgeXlsx"></div>
        </div>
      </div>
    </div>

    <!-- Step 2 產出 -->
    <div class="step-card">
      <div class="step-header">
        <div class="step-num">2</div>
        <div class="step-title">產出會議記錄</div>
      </div>
      <button id="generateBtn" onclick="startGenerate()" disabled>
        <span>⚡</span> 產出本週會議記錄 Word 檔
      </button>
    </div>

    <!-- 進度 -->
    <div id="progressArea">
      <div class="progress-title">處理中，請稍候…</div>
      <div class="progress-steps">
        <div class="progress-step" id="step_upload"><span class="icon">⏳</span> 上傳影片至 Gemini</div>
        <div class="progress-step" id="step_analyze"><span class="icon">⏳</span> AI 分析會議影片內容</div>
        <div class="progress-step" id="step_excel"><span class="icon">⏳</span> 讀取 Excel 報告資料</div>
        <div class="progress-step" id="step_prevdocx"><span class="icon">⏳</span> 讀取上週會議記錄</div>
        <div class="progress-step" id="step_word"><span class="icon">⏳</span> 產生 Word 會議記錄</div>
      </div>
    </div>

    <!-- 錯誤 -->
    <div id="errorArea"></div>

    <!-- 結果 -->
    <div id="resultArea">
      <div class="success-icon">✅</div>
      <h3>會議記錄已產生！</h3>
      <p id="resultDesc"></p>
      <button id="downloadBtn" onclick="downloadDocx()">⬇️ 下載 Word 檔</button>
    </div>
  </div>
</div>

<script>
// ── 設定 ──
let GEMINI_API_KEY = ''; // 由使用者登入後輸入
const ACCOUNTS = {
  'tlpmc':  { pass: 'Tl3686368',  name: '生管部' },
  'sales':  { pass: 'Tl$$$$$$',   name: '營業部' }
};

// ── 狀態 ──
let files = { mp4: null, docx: null, xlsx: null };
let docxBlob = null;
let docxFilename = '';

// ── 登入 ──
function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  const acc = ACCOUNTS[u];
  const apiKey = document.getElementById('loginApiKey').value.trim();
  if (acc && acc.pass === p && apiKey) {
    GEMINI_API_KEY = apiKey;
    document.getElementById('loginScreen').style.display = 'none';
    const ms = document.getElementById('mainScreen');
    ms.style.display = 'flex';
    document.getElementById('userLabel').textContent = acc.name + '　' + u;
  } else if (!apiKey) {
    document.getElementById('loginError').textContent = '請輸入 Gemini API Key。';
  } else {
    document.getElementById('loginError').textContent = '帳號或密碼錯誤，請重新輸入。';
  }
}
document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('loginUser').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

function doLogout() {
  document.getElementById('mainScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'block';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginApiKey').value = '';
  GEMINI_API_KEY = '';
  document.getElementById('loginError').textContent = '';
  files = { mp4: null, docx: null, xlsx: null };
  ['badgeMp4','badgeDocx','badgeXlsx'].forEach(id => document.getElementById(id).innerHTML = '');
  document.getElementById('resultArea').style.display = 'none';
  document.getElementById('progressArea').style.display = 'none';
  document.getElementById('errorArea').style.display = 'none';
  checkReady();
}

// ── 拖曳 ──
function dragOver(e, id) { e.preventDefault(); document.getElementById(id).classList.add('drag-over'); }
function dragLeave(id) { document.getElementById(id).classList.remove('drag-over'); }
function dropFile(e, type) {
  e.preventDefault();
  const id = { mp4: 'dropMp4', docx: 'dropDocx', xlsx: 'dropXlsx' }[type];
  document.getElementById(id).classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) setFile(type, file);
}
function fileSelected(e, type) {
  const file = e.target.files[0];
  if (file) setFile(type, file);
}
function setFile(type, file) {
  files[type] = file;
  const badgeId = { mp4: 'badgeMp4', docx: 'badgeDocx', xlsx: 'badgeXlsx' }[type];
  const size = (file.size / 1024 / 1024).toFixed(1);
  document.getElementById(badgeId).innerHTML =
    `<div class="file-badge">✓ ${file.name} <span class="remove" onclick="removeFile('${type}')">×</span></div>`;
  checkReady();
}
function removeFile(type) {
  files[type] = null;
  const badgeId = { mp4: 'badgeMp4', docx: 'badgeDocx', xlsx: 'badgeXlsx' }[type];
  document.getElementById(badgeId).innerHTML = '';
  checkReady();
}
function checkReady() {
  const ready = files.mp4 && files.docx && files.xlsx;
  document.getElementById('generateBtn').disabled = !ready;
}

// ── 進度更新 ──
function setStep(id, state) {
  const el = document.getElementById(id);
  el.className = 'progress-step ' + state;
  const icons = { active: '⏳', done: '✅', error: '❌' };
  el.querySelector('.icon').textContent = icons[state] || '⏳';
}

// ── 主流程 ──
async function startGenerate() {
  document.getElementById('generateBtn').disabled = true;
  document.getElementById('resultArea').style.display = 'none';
  document.getElementById('errorArea').style.display = 'none';
  document.getElementById('progressArea').style.display = 'block';
  ['step_upload','step_analyze','step_excel','step_prevdocx','step_word'].forEach(s => setStep(s, ''));

  try {
    // Step 1: 上傳影片至 Gemini
    setStep('step_upload', 'active');
    const videoUri = await uploadVideoToGemini(files.mp4);
    setStep('step_upload', 'done');

    // Step 2: Gemini 分析影片
    setStep('step_analyze', 'active');
    const transcript = await analyzeVideo(videoUri);
    setStep('step_analyze', 'done');

    // Step 3: 讀Excel
    setStep('step_excel', 'active');
    const excelData = await readExcel(files.xlsx);
    setStep('step_excel', 'done');

    // Step 3.5: 讀取上週會議記錄(取得第1、2、8、11項等沒有新資料來源的項目內容)
    setStep('step_prevdocx', 'active');
    const prevItems = await parsePreviousDocx(files.docx);
    setStep('step_prevdocx', 'done');

    // Step 4: 產Word
    setStep('step_word', 'active');
    const { blob, filename } = await buildDocx(transcript, excelData, prevItems);
    docxBlob = blob;
    docxFilename = filename;
    setStep('step_word', 'done');

    // 完成
    document.getElementById('resultDesc').textContent = '檔名：' + filename;
    document.getElementById('resultArea').style.display = 'block';

  } catch (err) {
    document.getElementById('errorArea').style.display = 'block';
    document.getElementById('errorArea').textContent = '❌ 發生錯誤：' + err.message;
    ['step_upload','step_analyze','step_excel','step_prevdocx','step_word'].forEach(s => {
      if (document.getElementById(s).classList.contains('active')) setStep(s, 'error');
    });
  } finally {
    document.getElementById('generateBtn').disabled = false;
  }
}

// ── 上傳影片到 Gemini File API ──
async function uploadVideoToGemini(file) {
  const arrayBuffer = await file.arrayBuffer();
  const bytes = new Uint8Array(arrayBuffer);

  const initResp = await fetch(
    `https://generativelanguage.googleapis.com/upload/v1beta/files?key=${GEMINI_API_KEY}`,
    {
      method: 'POST',
      headers: {
        'X-Goog-Upload-Protocol': 'resumable',
        'X-Goog-Upload-Command': 'start',
        'X-Goog-Upload-Header-Content-Length': bytes.length,
        'X-Goog-Upload-Header-Content-Type': 'video/mp4',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ file: { display_name: file.name } })
    }
  );
  if (!initResp.ok) throw new Error('影片上傳初始化失敗：' + await initResp.text());
  const uploadUrl = initResp.headers.get('X-Goog-Upload-URL');

  const uploadResp = await fetch(uploadUrl, {
    method: 'POST',
    headers: {
      'X-Goog-Upload-Command': 'upload, finalize',
      'X-Goog-Upload-Offset': '0',
      'Content-Type': 'video/mp4'
    },
    body: bytes
  });
  if (!uploadResp.ok) throw new Error('影片上傳失敗：' + await uploadResp.text());
  const uploadData = await uploadResp.json();
  const fileUri = uploadData.file?.uri;
  if (!fileUri) throw new Error('無法取得影片 URI');

  let state = uploadData.file?.state;
  let attempts = 0;
  while (state === 'PROCESSING' && attempts < 30) {
    await new Promise(r => setTimeout(r, 3000));
    const statusResp = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/files/${uploadData.file.name.split('/').pop()}?key=${GEMINI_API_KEY}`
    );
    const statusData = await statusResp.json();
    state = statusData.file?.state || statusData.state;
    attempts++;
  }
  if (state !== 'ACTIVE') throw new Error('影片處理逾時，請稍後再試。');
  return fileUri;
}

// ── Gemini 分析影片 ──
async function analyzeVideo(videoUri) {
  const prompt = `這是一個產銷會議錄影。請完成以下兩個任務：

1. 找出會議中主席詢問「南京有事情要討論嗎」或「漣水有事情要討論嗎」或「台灣有事情要討論嗎」之後的討論內容，這段是"其他事項"。請逐字轉錄台灣、南京、漣水各廠的發言內容，盡量完整，包含對照畫面討論的細節。

2. 如果有提到物料管理相關的數字（如主軸在庫數量、控制器數量等），請一併記錄。

請用以下 JSON 格式回覆，只回覆 JSON：
{"taiwan_other":"台灣廠其他事項逐字內容","nanjing_other":"南京廠其他事項逐字內容","lianshui_other":"漣水廠其他事項逐字內容","material_notes":"物料管理相關內容（如無則填空字串）","meeting_date_hint":"影片中提到的日期或週別（如有）"}`;

  const resp = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }, { file_data: { mime_type: 'video/mp4', file_uri: videoUri } }] }],
        generationConfig: { temperature: 0.1 }
      })
    }
  );
  if (!resp.ok) throw new Error('Gemini 分析失敗：' + await resp.text());
  const data = await resp.json();
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';

  try {
    const clean = text.replace(/```json|```/g, '').trim();
    return JSON.parse(clean);
  } catch {
    return { taiwan_other: text, nanjing_other: '', lianshui_other: '', material_notes: '', meeting_date_hint: '' };
  }
}

// ── 讀取Excel ──
async function readExcel(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array' });
        const data = {};

        // 產能供給
        if (wb.SheetNames.includes('產能供給')) {
          const ws = wb.Sheets['產能供給'];
          const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
          data.capacity = rows;
        }

        // 庫存機
        if (wb.SheetNames.includes('庫存機')) {
          const ws = wb.Sheets['庫存機'];
          const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
          data.inventory = rows;
        }

        // 庫存去化案
        if (wb.SheetNames.includes('庫存去化案')) {
          const ws = wb.Sheets['庫存去化案'];
          const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
          data.reduction = rows;
        }

        // 投產計畫表7月
        const julySheet = wb.SheetNames.find(n => n.includes('投產') && n.includes('7'));
        if (julySheet) {
          const ws = wb.Sheets[julySheet];
          const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
          data.julyPlan = rows;
        }

        resolve(data);
      } catch(err) { reject(err); }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

// ── 讀取上週會議記錄(docx),取出每一項「決議事項」欄位的完整內容 ──
// 用途:第1、2、8、11項目前沒有 Excel/影片資料可以更新,預設沿用上週實際文件的內容,
// 而不是把某一週的文字寫死在程式碼裡(這是之前造成「舊紀錄夾雜、內容跑到錯的項次」的根本原因)。
async function parsePreviousDocx(file) {
  const items = {};
  if (!file) return items;
  try {
    const arrayBuffer = await file.arrayBuffer();
    const result = await mammoth.convertToHtml({ arrayBuffer });
    const parser = new DOMParser();
    const htmlDoc = parser.parseFromString(result.value, 'text/html');
    const tables = htmlDoc.querySelectorAll('table');

    // 找出「項次/決議事項」那張主表:列數最多的表格
    let mainTable = null, maxRows = 0;
    tables.forEach(t => {
      const rows = t.querySelectorAll('tr').length;
      if (rows > maxRows) { maxRows = rows; mainTable = t; }
    });
    if (!mainTable) return items;

    mainTable.querySelectorAll('tr').forEach(row => {
      const cells = row.querySelectorAll('td,th');
      if (cells.length < 2) return;
      const numText = cells[0].textContent.trim();
      const m = numText.match(/^(\d{1,2})\.?$/);
      if (!m) return;
      const itemNum = parseInt(m[1], 10);

      // 決議事項欄位:每個 <p> 對應原本 Word 裡的一行,用 \n 接回來
      // 注意:Word 裡有項目符號(●)格式的段落,mammoth 會轉成 <li> 而不是 <p>,兩種都要抓
      const paras = cells[1].querySelectorAll('p, li');
      let lines;
      if (paras.length > 0) {
        lines = Array.prototype.map.call(paras, p => p.textContent.replace(/\u00a0/g, ' ').trim());
      } else {
        lines = [cells[1].textContent.replace(/\u00a0/g, ' ').trim()];
      }
      items[itemNum] = lines.join('\n').trim();
    });
  } catch (err) {
    console.warn('讀取上週會議記錄失敗,第1/2/8/11項將使用預設文字:', err);
  }
  return items;
}

// ── 從Excel萃取關鍵數字 ──
function extractNumbers(excelData) {
  const result = {
    cap6_tw: '－', cap6_nj: '－', cap6_ls: '－',
    wip_tw: '－', wip_nj: '－', wip_ls: '－',
    last_done_tw: '－', last_done_nj: '－', last_done_ls: '－',
    this_plan_tw: '－', this_plan_nj: '－', this_plan_ls: '－',
    cap7_tw: '－', cap7_nj: '－', cap7_ls: '－',
    inv_tw_total: '－', inv_tw_has: '－', inv_tw_no: '－',
    inv_nj_total: '－', inv_nj_has: '－', inv_nj_no: '－',
    inv_ls_total: '－', inv_ls_has: '－', inv_ls_no: '－',
    weekLabel_last: '', weekLabel_this: ''
  };

  const cap = excelData.capacity || [];

  // DEBUG: 印出關鍵行
  console.log('=== Excel Debug ===');
  [71,72,124,125,151,152].forEach(i => {
    if (cap[i]) console.log(`Row${i+1}: r0="${cap[i][0]}" r2=${cap[i][2]} r4=${cap[i][4]} r8=${cap[i][8]} r10=${cap[i][10]} r14=${cap[i][14]} r16=${cap[i][16]}`);
  });

  // 掃描所有行
  let foundWip = false, foundLastDone = false, foundThisPlan = false;
  for (let i = 0; i < cap.length; i++) {
    const row = cap[i];
    if (!row || row.length === 0) continue;
    const r0 = String(row[0] || '');

    // 6月投產：row結構 [TW/6月投產, _, 數字, 產能, _, _, NJ/6月投产, _, 數字, ...]
    if (r0.includes('6月投')) {
      if (typeof row[2] === 'number' && result.cap6_tw === '－') result.cap6_tw = String(row[2]);
      if (typeof row[8] === 'number' && result.cap6_nj === '－') result.cap6_nj = String(row[8]);
      if (typeof row[14] === 'number' && result.cap6_ls === '－') result.cap6_ls = String(row[14]);
    }

    // WIP：找「二、未完工在製品」後的TW行（col4有數字）
    if (r0.includes('未完工')) { foundWip = true; continue; }
    if (foundWip && r0 === 'TW' && typeof row[4] === 'number' && row[4] > 0) {
      result.wip_tw = String(row[4]);
      if (typeof row[10] === 'number') result.wip_nj = String(row[10]);
      if (typeof row[16] === 'number') result.wip_ls = String(row[16]);
      foundWip = false;
    }

    // 上週完工標題行
    if (r0.includes('上週完工') || r0.includes('4-2上')) {
      foundLastDone = true;
      const m = r0.match(/[（(]([^）)]+)[）)]/);
      if (m) result.weekLabel_last = m[1];
      continue;
    }
    // 上週完工數字行（TW行，col2有數字，col3含達成率）
    if (foundLastDone && r0 === 'TW' && typeof row[2] === 'number') {
      result.last_done_tw = String(row[2]);
      if (typeof row[8] === 'number') result.last_done_nj = String(row[8]);
      if (typeof row[14] === 'number') result.last_done_ls = String(row[14]);
      foundLastDone = false;
    }

    // 本週完工計畫標題行
    if (r0.includes('本週完工') || r0.includes('4-3本')) {
      foundThisPlan = true;
      const m = r0.match(/[（(]([^）)]+)[）)]/);
      if (m) result.weekLabel_this = m[1];
      continue;
    }
    // 本週完工計畫數字行
    if (foundThisPlan && r0 === 'TW' && typeof row[2] === 'number') {
      result.this_plan_tw = String(row[2]);
      if (typeof row[8] === 'number') result.this_plan_nj = String(row[8]);
      if (typeof row[14] === 'number') result.this_plan_ls = String(row[14]);
      foundThisPlan = false;
    }
  }

  // 7月投產
  const july = excelData.julyPlan || [];
  for (let i = 0; i < Math.min(july.length, 5); i++) {
    const row = july[i];
    if (!row) continue;
    const r0 = String(row[0] || '');
    if (r0.includes('7月投')) {
      if (typeof row[2] === 'number' && result.cap7_tw === '－') result.cap7_tw = String(row[2]);
      if (typeof row[9] === 'number' && result.cap7_nj === '－') result.cap7_nj = String(row[9]);
      if (typeof row[16] === 'number' && result.cap7_ls === '－') result.cap7_ls = String(row[16]);
    }
  }

  // 庫存機：TW後第2行 row[0]=總數, row[1]=有客戶數
  const inv = excelData.inventory || [];
  let curSection = '';
  for (let i = 0; i < inv.length; i++) {
    const row = inv[i];
    if (!row) continue;
    const r0 = String(row[0] || '');
    if (r0 === 'TW') { curSection = 'TW'; continue; }
    if (r0 === 'NJ') { curSection = 'NJ'; continue; }
    if (r0 === 'LS') { curSection = 'LS'; continue; }
    if (r0 === '總計') continue; // 跳過表頭
    if (curSection && typeof row[0] === 'number' && row[0] > 5 && typeof row[1] === 'number') {
      const total = row[0], has = row[1], no = total - has;
      if (curSection === 'TW' && result.inv_tw_total === '－') {
        result.inv_tw_total = String(total); result.inv_tw_has = String(has); result.inv_tw_no = String(no); curSection = '';
      } else if (curSection === 'NJ' && result.inv_nj_total === '－') {
        result.inv_nj_total = String(total); result.inv_nj_has = String(has); result.inv_nj_no = String(no); curSection = '';
      } else if (curSection === 'LS' && result.inv_ls_total === '－') {
        result.inv_ls_total = String(total); result.inv_ls_has = String(has); result.inv_ls_no = String(no); curSection = '';
      }
    }
  }

  return result;
}

// ── 第8項「庫存去化案」:抓「庫存去化案」工作表裡「總計」列,最右邊(最新一週)的數字 ──
// 該表格每週會往右新增一欄,所以不能用固定欄位,要從最後一欄往左找第一個數字
function extractReductionTotal(excelData) {
  const rows = excelData.reduction;
  if (!rows || rows.length === 0) return null;
  let totalRow = null;
  for (const row of rows) {
    if (row && typeof row[0] === 'string' && row[0].includes('總計')) { totalRow = row; break; }
  }
  if (!totalRow) return null;
  const nums = [];
  for (let c = totalRow.length - 1; c >= 0 && nums.length < 2; c--) {
    const v = totalRow[c];
    if (typeof v === 'number') nums.push(v);
  }
  if (nums.length === 0) return null;
  return { thisWeek: nums[0], lastWeek: nums.length > 1 ? nums[1] : null };
}

// ── 計算本週日期 ──
function getMeetingDate() {
  const now = new Date();
  // 找最近的週一
  const day = now.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  const monday = new Date(now);
  monday.setDate(now.getDate() + diff);
  const m = monday.getMonth() + 1;
  const d = monday.getDate();
  return `${m}月${d}日`;
}

              C(`【庫存機統計】\n● 台灣廠：${nums.inv_tw_total} 台 (有客戶 ${nums.inv_tw_has} / 無客戶 ${nums.inv_tw_no})\n● 南京廠：${nums.inv_nj_total} 台 (有客戶 ${nums.inv_nj_has} / 無客戶 ${nums.inv_nj_no})\n● 漣水廠：${nums.inv_ls_total} 台 (有客戶 ${nums.inv_ls_has} / 無客戶 ${nums.inv_ls_no})`,{size:20,width:c2}),
              C("營業部\n生管",{size:20,width:c3,align:AlignmentType.CENTER}), C("即日起",{size:20,width:c4,align:AlignmentType.CENTER})),

            // 8 庫存去化案(沿用上週記錄,無新資料來源)
            R(C("8.",{size:20,width:c1,align:AlignmentType.CENTER}),
              C(item8Content,{size:20,width:c2}),
              C("營業部\n生管\n資材部",{size:20,width:c3,align:AlignmentType.CENTER}), C("即日起",{size:20,width:c4,align:AlignmentType.CENTER})),

            // 9 物料管理
            R(C("9.",{size:20,width:c1,align:AlignmentType.CENTER}),
              C(`【物料管理】\n${matNotes}`,{size:20,width:c2}),
              C("資材部",{size:20,width:c3,align:AlignmentType.CENTER}), C("即日起",{size:20,width:c4,align:AlignmentType.CENTER})),

            // 10 其他事項
            R(C("10.",{size:20,width:c1,align:AlignmentType.CENTER}),
              C(`【其他事項】\n●台灣：\n${twOther}\n\n●南京：\n${njOther}\n\n●漣水：\n${lsOther}`,{size:20,width:c2}),
              C("各廠",{size:20,width:c3,align:AlignmentType.CENTER}), C("即日起",{size:20,width:c4,align:AlignmentType.CENTER})),

            // 11 上級指導(沿用上週記錄,無新資料來源)
            R(C("11.",{size:20,width:c1,align:AlignmentType.CENTER}),
              C(item11Content,{size:20,width:c2}),
              C("",{size:20,width:c3}), C("",{size:20,width:c4})),
          ]
        })
      ]
    }]
  });

  const blob = await Packer.toBlob(doc);
  return { blob, filename };
}

// ── 下載 ──
function downloadDocx() {
  if (!docxBlob) return;
  const url = URL.createObjectURL(docxBlob);
  const a = document.createElement('a');
  a.href = url; a.download = docxFilename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
